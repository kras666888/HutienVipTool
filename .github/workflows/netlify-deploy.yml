name: Deploy To Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Validate required Netlify secrets
        shell: bash
        run: |
          missing=0
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::Missing secret NETLIFY_AUTH_TOKEN"
            missing=1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::Missing secret NETLIFY_SITE_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "::error::Please set repository secrets at Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --message="GitHub Actions ${GITHUB_SHA}"
