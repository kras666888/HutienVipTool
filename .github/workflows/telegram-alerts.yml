name: Telegram Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"

concurrency:
  group: telegram-alerts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tx2:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TX2 telegram bot
        run: timeout 3m node bot-telegram.cjs || true
        env:
          BOT_ROLE: telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BASE_BET: ${{ secrets.BASE_BET }}

  taixiu:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TAI XIU telegram bot
        run: timeout 3m node bot-taixiu.cjs || true
        env:
          BOT_ROLE: telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_TAIXIU: ${{ secrets.TELEGRAM_CHAT_ID_TAIXIU }}
          TELEGRAM_CHAT_ID_TX: ${{ secrets.TELEGRAM_CHAT_ID_TX }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BASE_BET_TAIXIU: ${{ secrets.BASE_BET_TAIXIU }}
          BASE_BET_TX: ${{ secrets.BASE_BET_TX }}
          BASE_BET: ${{ secrets.BASE_BET }}

  xocdia:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run XOC DIA telegram bot
        run: timeout 3m node bot-xocdia.cjs || true
        env:
          BOT_ROLE: telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_XOCDIA: ${{ secrets.TELEGRAM_CHAT_ID_XOCDIA }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BASE_BET_XOCDIA: ${{ secrets.BASE_BET_XOCDIA }}
          BASE_BET: ${{ secrets.BASE_BET }}
