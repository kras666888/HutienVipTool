name: Sync Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: sync-stats-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TX2 stats bot for a bounded window
        run: timeout 75s node bot-telegram.stats.cjs || true
        env:
          BASE_BET: ${{ secrets.BASE_BET }}

      - name: Run TAI XIU stats bot for a bounded window
        run: timeout 75s node bot-taixiu.stats.cjs || true
        env:
          BASE_BET_TAIXIU: ${{ secrets.BASE_BET_TAIXIU }}
          BASE_BET_TX: ${{ secrets.BASE_BET_TX }}
          BASE_BET: ${{ secrets.BASE_BET }}

      - name: Run XOC DIA stats bot for a bounded window
        run: timeout 75s node bot-xocdia.stats.cjs || true
        env:
          BASE_BET_XOCDIA: ${{ secrets.BASE_BET_XOCDIA }}
          BASE_BET: ${{ secrets.BASE_BET }}

      - name: Commit stats if changed
        run: |
          if git diff --quiet -- public/stats; then
            echo "No stats changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/stats
          git commit -m "chore: sync stats [skip ci]"
          git push