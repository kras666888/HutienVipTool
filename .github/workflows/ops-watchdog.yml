name: Ops Watchdog

on:
  workflow_dispatch:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Sync Stats
      - Telegram Alerts
    types:
      - completed
  schedule:
    - cron: "4,14,24,34,44,54 * * * *"

concurrency:
  group: ops-watchdog-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check pipeline freshness and auto-dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURL_OPTS="--connect-timeout 10 --max-time 20"

          REPO="${GITHUB_REPOSITORY}"
          API="https://api.github.com/repos/${REPO}"
          NOW="$(date -u +%s)"
          dispatched="0"

          check_stats_url() {
            local url="$1"
            local max_age_sec="$2"

            local body
            body="$(curl -fsSL ${CURL_OPTS} "$url")"
            local updated_at
            updated_at="$(echo "$body" | jq -r '.updatedAt // empty')"
            if [ -z "$updated_at" ]; then
              return 1
            fi

            local ts
            ts="$(date -u -d "$updated_at" +%s)"
            local age=$((NOW - ts))
            [ "$age" -le "$max_age_sec" ]
          }

          check_workflow_recent() {
            local workflow_file="$1"
            local max_age_sec="$2"

            local runs
            runs="$(curl -fsSL ${CURL_OPTS} -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}/actions/workflows/${workflow_file}/runs?per_page=1")"
            local created_at
            created_at="$(echo "$runs" | jq -r '.workflow_runs[0].created_at // empty')"
            if [ -z "$created_at" ]; then
              return 1
            fi

            local ts
            ts="$(date -u -d "$created_at" +%s)"
            local age=$((NOW - ts))
            [ "$age" -le "$max_age_sec" ]
          }

          dispatch_workflow() {
            local workflow_file="$1"
            curl -fsSL ${CURL_OPTS} -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API}/actions/workflows/${workflow_file}/dispatches" \
              -d "{\"ref\":\"${GITHUB_REF_NAME}\"}" >/dev/null
            dispatched="1"
            echo "Dispatched ${workflow_file}"
          }

          cancel_stuck_run_and_redrive() {
            local workflow_file="$1"
            local max_age_sec="$2"

            local runs
            runs="$(curl -fsSL ${CURL_OPTS} -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "${API}/actions/workflows/${workflow_file}/runs?status=in_progress&per_page=1")"
            local run_id
            run_id="$(echo "$runs" | jq -r '.workflow_runs[0].id // empty')"
            local created_at
            created_at="$(echo "$runs" | jq -r '.workflow_runs[0].created_at // empty')"

            if [ -z "$run_id" ] || [ -z "$created_at" ]; then
              return 0
            fi

            local ts
            ts="$(date -u -d "$created_at" +%s)"
            local age=$((NOW - ts))

            if [ "$age" -gt "$max_age_sec" ]; then
              curl -fsSL ${CURL_OPTS} -X POST \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${API}/actions/runs/${run_id}/cancel" >/dev/null || true
              echo "Canceled stuck run ${run_id} for ${workflow_file} (age=${age}s)"
              dispatch_workflow "$workflow_file"
            fi
          }

          RAW_BASE="https://raw.githubusercontent.com/${REPO}/main/public/stats"

          cancel_stuck_run_and_redrive "sync-stats.yml" 180
          cancel_stuck_run_and_redrive "telegram-alerts.yml" 180

          if ! check_stats_url "${RAW_BASE}/taixiu.json" 1200 || \
             ! check_stats_url "${RAW_BASE}/tx2.json" 1200 || \
             ! check_stats_url "${RAW_BASE}/xocdia.json" 1200; then
            dispatch_workflow "sync-stats.yml"
          fi

          if ! check_workflow_recent "sync-stats.yml" 900; then
            dispatch_workflow "sync-stats.yml"
          fi

          if ! check_workflow_recent "telegram-alerts.yml" 900; then
            dispatch_workflow "telegram-alerts.yml"
          fi

          if [ "$dispatched" = "0" ]; then
            echo "Pipelines are healthy"
          fi
